<div>
  <h2 id="page-heading" data-cy="GraphicElementPosHeading">
    <span jhiTranslate="grafismoApp.graphicElementPos.home.title">Graphic Element Pos</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="reset()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="grafismoApp.graphicElementPos.home.refreshListLabel">Refresh List</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-graphic-element-pos"
        [routerLink]="['/graphic-element-pos/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="grafismoApp.graphicElementPos.home.createLabel"> Create a new Graphic Element Pos </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="graphicElementPos?.length === 0">
    <span jhiTranslate="grafismoApp.graphicElementPos.home.notFound">No graphicElementPos found</span>
  </div>

  <div class="table-responsive" id="entities" *ngIf="graphicElementPos && graphicElementPos.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" (sortChange)="reset()">
          <th scope="col" jhiSortBy="id"><span jhiTranslate="global.field.id">ID</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="name">
            <span jhiTranslate="grafismoApp.graphicElementPos.name">Name</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col" jhiSortBy="x"><span jhiTranslate="grafismoApp.graphicElementPos.x">X</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="y"><span jhiTranslate="grafismoApp.graphicElementPos.y">Y</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="parent.name">
            <span jhiTranslate="grafismoApp.graphicElementPos.parent">Parent</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody infinite-scroll (scrolled)="loadPage(page + 1)" [infiniteScrollDisabled]="page >= links['last']" [infiniteScrollDistance]="0">
        <tr *ngFor="let graphicElementPos of graphicElementPos; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/graphic-element-pos', graphicElementPos.id, 'view']">{{ graphicElementPos.id }}</a>
          </td>
          <td>{{ graphicElementPos.name }}</td>
          <td>{{ graphicElementPos.x }}</td>
          <td>{{ graphicElementPos.y }}</td>
          <td>
            <div *ngIf="graphicElementPos.parent">
              <a [routerLink]="['/graphic-element-pos', graphicElementPos.parent?.id, 'view']">{{ graphicElementPos.parent?.name }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/graphic-element-pos', graphicElementPos.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/graphic-element-pos', graphicElementPos.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
              </button>

              <button type="submit" (click)="delete(graphicElementPos)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
