<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="graphicElementPos">
      <h2 data-cy="graphicElementPosDetailsHeading">
        <span jhiTranslate="grafismoApp.graphicElementPos.detail.title">Graphic Element Pos</span>
      </h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span jhiTranslate="global.field.id">ID</span></dt>
        <dd>
          <span>{{ graphicElementPos.id }}</span>
        </dd>
        <dt><span jhiTranslate="grafismoApp.graphicElementPos.name">Name</span></dt>
        <dd>
          <span>{{ graphicElementPos.name }}</span>
        </dd>
        <dt><span jhiTranslate="grafismoApp.graphicElementPos.x">X</span></dt>
        <dd>
          <span>{{ graphicElementPos.x }}</span>
        </dd>
        <dt><span jhiTranslate="grafismoApp.graphicElementPos.y">Y</span></dt>
        <dd>
          <span>{{ graphicElementPos.y }}</span>
        </dd>
        <dt><span jhiTranslate="grafismoApp.graphicElementPos.parent">Parent</span></dt>
        <dd>
          <div *ngIf="graphicElementPos.parent">
            <a [routerLink]="['/graphic-element-pos', graphicElementPos.parent?.id, 'view']">{{ graphicElementPos.parent?.name }}</a>
          </div>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
      </button>

      <button type="button" [routerLink]="['/graphic-element-pos', graphicElementPos.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
      </button>
    </div>
  </div>
</div>
