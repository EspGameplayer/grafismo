<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="broadcastStaffMember">
      <h2 data-cy="broadcastStaffMemberDetailsHeading">
        <span jhiTranslate="grafismoApp.broadcastStaffMember.detail.title">Broadcast Staff Member</span>
      </h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span jhiTranslate="global.field.id">ID</span></dt>
        <dd>
          <span>{{ broadcastStaffMember.id }}</span>
        </dd>
        <dt><span jhiTranslate="grafismoApp.broadcastStaffMember.person">Person</span></dt>
        <dd>
          <div *ngIf="broadcastStaffMember.person">
            <a [routerLink]="['/person', broadcastStaffMember.person?.id, 'view']">{{ broadcastStaffMember.person?.graphicsName }}</a>
          </div>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
      </button>

      <button type="button" [routerLink]="['/broadcast-staff-member', broadcastStaffMember.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
      </button>
    </div>
  </div>
</div>
