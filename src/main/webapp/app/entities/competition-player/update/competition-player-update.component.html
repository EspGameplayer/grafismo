<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        id="jhi-competition-player-heading"
        data-cy="CompetitionPlayerCreateUpdateHeading"
        jhiTranslate="grafismoApp.competitionPlayer.home.createOrEditLabel"
      >
        Create or edit a Competition Player
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" [hidden]="editForm.get('id')!.value == null">
          <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="grafismoApp.competitionPlayer.preferredShirtNumber" for="field_preferredShirtNumber"
            >Preferred Shirt Number</label
          >
          <input
            type="number"
            class="form-control"
            name="preferredShirtNumber"
            id="field_preferredShirtNumber"
            data-cy="preferredShirtNumber"
            formControlName="preferredShirtNumber"
          />
          <div
            *ngIf="
              editForm.get('preferredShirtNumber')!.invalid &&
              (editForm.get('preferredShirtNumber')!.dirty || editForm.get('preferredShirtNumber')!.touched)
            "
          >
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('preferredShirtNumber')?.errors?.min"
              jhiTranslate="entity.validation.min"
              [translateValues]="{ min: 0 }"
            >
              This field should be at least 0.
            </small>
            <small
              class="form-text text-danger"
              [hidden]="!editForm.get('preferredShirtNumber')?.errors?.number"
              jhiTranslate="entity.validation.number"
            >
              This field should be a number.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="grafismoApp.competitionPlayer.player" for="field_player">Player</label>
          <select class="form-control" id="field_player" data-cy="player" name="player" formControlName="player">
            <option *ngIf="!editForm.get('player')!.value" [ngValue]="null" selected></option>
            <option
              [ngValue]="playerOption.id === editForm.get('player')!.value?.id ? editForm.get('player')!.value : playerOption"
              *ngFor="let playerOption of playersSharedCollection; trackBy: trackPlayerById"
            >
              {{ playerOption.id }}
            </option>
          </select>
        </div>
        <div *ngIf="editForm.get(['player'])!.invalid && (editForm.get(['player'])!.dirty || editForm.get(['player'])!.touched)">
          <small class="form-text text-danger" *ngIf="editForm.get(['player'])?.errors?.required" jhiTranslate="entity.validation.required">
            This field is required.
          </small>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="grafismoApp.competitionPlayer.competition" for="field_competition">Competition</label>
          <select class="form-control" id="field_competition" data-cy="competition" name="competition" formControlName="competition">
            <option *ngIf="!editForm.get('competition')!.value" [ngValue]="null" selected></option>
            <option
              [ngValue]="
                competitionOption.id === editForm.get('competition')!.value?.id ? editForm.get('competition')!.value : competitionOption
              "
              *ngFor="let competitionOption of competitionsSharedCollection; trackBy: trackCompetitionById"
            >
              {{ competitionOption.graphicsName }}
            </option>
          </select>
        </div>
        <div
          *ngIf="editForm.get(['competition'])!.invalid && (editForm.get(['competition'])!.dirty || editForm.get(['competition'])!.touched)"
        >
          <small
            class="form-text text-danger"
            *ngIf="editForm.get(['competition'])?.errors?.required"
            jhiTranslate="entity.validation.required"
          >
            This field is required.
          </small>
        </div>

        <div class="row mb-3">
          <label jhiTranslate="grafismoApp.competitionPlayer.preferredPosition" for="field_preferredPositions">Preferred Position</label>
          <select
            class="form-control"
            id="field_preferredPositions"
            data-cy="preferredPosition"
            multiple
            name="preferredPositions"
            formControlName="preferredPositions"
          >
            <option
              [ngValue]="getSelectedPosition(positionOption, editForm.get('preferredPositions')!.value)"
              *ngFor="let positionOption of positionsSharedCollection; trackBy: trackPositionById"
            >
              {{ positionOption.abb }}
            </option>
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Save</span>
        </button>
      </div>
    </form>
  </div>
</div>
