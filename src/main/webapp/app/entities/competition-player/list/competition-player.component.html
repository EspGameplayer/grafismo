<div>
  <h2 id="page-heading" data-cy="CompetitionPlayerHeading">
    <span jhiTranslate="grafismoApp.competitionPlayer.home.title">Competition Players</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="reset()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="grafismoApp.competitionPlayer.home.refreshListLabel">Refresh List</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-competition-player"
        [routerLink]="['/competition-player/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="grafismoApp.competitionPlayer.home.createLabel"> Create a new Competition Player </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="competitionPlayers?.length === 0">
    <span jhiTranslate="grafismoApp.competitionPlayer.home.notFound">No competitionPlayers found</span>
  </div>

  <div class="table-responsive" id="entities" *ngIf="competitionPlayers && competitionPlayers.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" (sortChange)="reset()">
          <th scope="col" jhiSortBy="id"><span jhiTranslate="global.field.id">ID</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="preferredShirtNumber">
            <span jhiTranslate="grafismoApp.competitionPlayer.preferredShirtNumber">Preferred Shirt Number</span>
            <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col" jhiSortBy="player.id">
            <span jhiTranslate="grafismoApp.competitionPlayer.player">Player</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col" jhiSortBy="competition.graphicsName">
            <span jhiTranslate="grafismoApp.competitionPlayer.competition">Competition</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody infinite-scroll (scrolled)="loadPage(page + 1)" [infiniteScrollDisabled]="page >= links['last']" [infiniteScrollDistance]="0">
        <tr *ngFor="let competitionPlayer of competitionPlayers; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/competition-player', competitionPlayer.id, 'view']">{{ competitionPlayer.id }}</a>
          </td>
          <td>{{ competitionPlayer.preferredShirtNumber }}</td>
          <td>
            <div *ngIf="competitionPlayer.player">
              <a [routerLink]="['/player', competitionPlayer.player?.id, 'view']">{{ competitionPlayer.player?.id }}</a>
            </div>
          </td>
          <td>
            <div *ngIf="competitionPlayer.competition">
              <a [routerLink]="['/competition', competitionPlayer.competition?.id, 'view']">{{
                competitionPlayer.competition?.graphicsName
              }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/competition-player', competitionPlayer.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/competition-player', competitionPlayer.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
              </button>

              <button type="submit" (click)="delete(competitionPlayer)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
