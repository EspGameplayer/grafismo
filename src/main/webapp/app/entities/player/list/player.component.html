<div>
  <h2 id="page-heading" data-cy="PlayerHeading">
    <span jhiTranslate="grafismoApp.player.home.title">Players</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="reset()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="grafismoApp.player.home.refreshListLabel">Refresh List</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-player"
        [routerLink]="['/player/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="grafismoApp.player.home.createLabel"> Create a new Player </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="players?.length === 0">
    <span jhiTranslate="grafismoApp.player.home.notFound">No players found</span>
  </div>

  <div class="table-responsive" id="entities" *ngIf="players && players.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" (sortChange)="reset()">
          <th scope="col" jhiSortBy="id"><span jhiTranslate="global.field.id">ID</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="strongerFoot">
            <span jhiTranslate="grafismoApp.player.strongerFoot">Stronger Foot</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col" jhiSortBy="height">
            <span jhiTranslate="grafismoApp.player.height">Height</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col" jhiSortBy="weight">
            <span jhiTranslate="grafismoApp.player.weight">Weight</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col" jhiSortBy="photo"><span jhiTranslate="grafismoApp.player.photo">Photo</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="person.graphicsName">
            <span jhiTranslate="grafismoApp.player.person">Person</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col" jhiSortBy="team.graphicsName">
            <span jhiTranslate="grafismoApp.player.team">Team</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody infinite-scroll (scrolled)="loadPage(page + 1)" [infiniteScrollDisabled]="page >= links['last']" [infiniteScrollDistance]="0">
        <tr *ngFor="let player of players; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/player', player.id, 'view']">{{ player.id }}</a>
          </td>
          <td jhiTranslate="{{ 'grafismoApp.Foot.' + player.strongerFoot }}">{{ player.strongerFoot }}</td>
          <td>{{ player.height }}</td>
          <td>{{ player.weight }}</td>
          <td>
            <a *ngIf="player.photo" (click)="openFile(player.photo, player.photoContentType)">
              <img [src]="'data:' + player.photoContentType + ';base64,' + player.photo" style="max-height: 30px" alt="player image" />
            </a>
            <span *ngIf="player.photo">{{ player.photoContentType }}, {{ byteSize(player.photo) }}</span>
          </td>
          <td>
            <div *ngIf="player.person">
              <a [routerLink]="['/person', player.person?.id, 'view']">{{ player.person?.graphicsName }}</a>
            </div>
          </td>
          <td>
            <div *ngIf="player.team">
              <a [routerLink]="['/team', player.team?.id, 'view']">{{ player.team?.graphicsName }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <button type="submit" [routerLink]="['/player', player.id, 'view']" class="btn btn-info btn-sm" data-cy="entityDetailsButton">
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
              </button>

              <button type="submit" [routerLink]="['/player', player.id, 'edit']" class="btn btn-primary btn-sm" data-cy="entityEditButton">
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
              </button>

              <button type="submit" (click)="delete(player)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
